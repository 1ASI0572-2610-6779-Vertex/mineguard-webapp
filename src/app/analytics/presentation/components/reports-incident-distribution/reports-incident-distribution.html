<section class="distribution-card">
  <header class="card-header">
    <div class="title-block">
      <h2>{{ 'reports.incidentDistribution.title' | translate }}</h2>
      <p class="subtitle">{{ 'reports.incidentDistribution.subtitle' | translate }}</p>
    </div>
    <button mat-icon-button class="export-btn" [title]="'reports.export' | translate">
      <mat-icon>download</mat-icon>
    </button>
  </header>

  <div class="donut-container">
    <svg class="donut" viewBox="0 0 160 160">
      <circle class="donut-bg" cx="80" cy="80" r="60" />
      @for (segment of segments(); track segment.id) {
        <circle
          class="donut-segment"
          [class]="segment.colorClass"
          cx="80"
          cy="80"
          r="60"
          [attr.stroke-dasharray]="segment.dashArray"
          [attr.stroke-dashoffset]="segment.dashOffset"
        />
      }
      <text class="donut-total" x="80" y="78" text-anchor="middle">{{ totalIncidents() }}</text>
      <text class="donut-total-label" x="80" y="94" text-anchor="middle">
        {{ 'reports.incidentDistribution.total' | translate }}
      </text>
    </svg>

    <ul class="legend">
      @for (segment of segments(); track segment.id) {
        <li class="legend-item">
          <span class="legend-dot" [class]="segment.colorClass"></span>
          <span class="legend-label">{{ segment.label }}</span>
          <span class="legend-count">{{ segment.count }}</span>
        </li>
      }
    </ul>
  </div>
</section>
