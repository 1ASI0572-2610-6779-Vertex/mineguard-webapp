<section class="distribution-card">

  <!-- Header -->
  <header class="card-header">
    <div class="header-left">
      <div class="header-icon">
        <mat-icon>donut_large</mat-icon>
      </div>
      <div class="title-block">
        <h2>{{ 'reports.incidentDistribution.title' | translate }}</h2>
        <p class="subtitle">{{ 'reports.incidentDistribution.subtitle' | translate }}</p>
      </div>
    </div>
  </header>

  <!-- Donut + legend -->
  <div class="donut-container">

    <!-- SVG donut -->
    <div class="donut-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <!-- Background ring -->
        <circle class="donut-bg" cx="80" cy="80" r="54" />

        <!-- Coloured segments -->
        @for (seg of segments(); track seg.id) {
          <circle
            class="donut-segment"
            [class.donut-segment--dimmed]="isSegmentDimmed(seg.id)"
            cx="80" cy="80" r="54"
            [attr.stroke]="seg.cssColor"
            [attr.stroke-dasharray]="seg.dashArray"
            [attr.stroke-dashoffset]="seg.dashOffset"
            (mouseenter)="hoveredId.set(seg.id)"
            (mouseleave)="hoveredId.set(null)"
          />
        }

        <!-- Centre label — shows hovered segment or total -->
        @if (hoveredSegment(); as hs) {
          <text class="donut-center-value" x="80" y="75" text-anchor="middle">{{ hs.count }}</text>
          <text class="donut-center-label" x="80" y="91" text-anchor="middle">{{ hs.percent }}%</text>
        } @else {
          <text class="donut-center-value" x="80" y="75" text-anchor="middle">{{ totalIncidents() }}</text>
          <text class="donut-center-label" x="80" y="91" text-anchor="middle">{{ 'reports.incidentDistribution.total' | translate }}</text>
        }
      </svg>
    </div>

    <!-- Legend -->
    <ul class="legend" role="list">
      @for (seg of segments(); track seg.id) {
        <li
          class="legend-item"
          [class.legend-item--dimmed]="isSegmentDimmed(seg.id)"
          [class.legend-item--active]="hoveredId() === seg.id"
          (mouseenter)="hoveredId.set(seg.id)"
          (mouseleave)="hoveredId.set(null)"
          role="listitem">
          <span class="legend-dot" [style.background]="seg.cssColor"></span>
          <span class="legend-label">{{ seg.label }}</span>
          <span class="legend-count">{{ seg.count }}</span>
          <span class="legend-pct">{{ seg.percent }}%</span>
        </li>
      }
    </ul>

  </div>

</section>
