<div class="sp-page">

  <!-- Header -->
  <header class="sp-header">
    <div class="sp-header-left">
      <div class="sp-icon">
        <mat-icon>manage_accounts</mat-icon>
      </div>
      <div class="sp-title-block">
        <h1 class="sp-title">Gestión de Usuarios</h1>
        <p class="sp-subtitle">Administra las cuentas de acceso del sistema MineGuard</p>
      </div>
    </div>
    <div class="sp-header-right">
      @if (supervisorCount() > 0) {
        <span class="sp-count-chip">
          <mat-icon class="sp-count-icon">group</mat-icon>
          {{ supervisorCount() }} supervisores
        </span>
      }
      <button mat-flat-button class="sp-add-btn" (click)="openCreateDialog()">
        <mat-icon>person_add</mat-icon>
        Nuevo Supervisor
      </button>
    </div>
  </header>

  <!-- Directory -->
  <div class="sp-body">
    <app-supervisor-directory [supervisors]="supervisors()"></app-supervisor-directory>
  </div>

</div>
