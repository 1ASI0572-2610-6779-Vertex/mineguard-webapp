<form class="supervisor-form" [formGroup]="form" (ngSubmit)="submit()">
  <header class="form-header">
    <mat-icon class="header-icon">person_add</mat-icon>
    <h2>{{ 'iam.supervisors.newSupervisor.title' | translate }}</h2>
  </header>

  <div class="field">
    <label for="supervisor-fullName">
      {{ 'iam.supervisors.newSupervisor.fullName.label' | translate }}
    </label>
    <input
      id="supervisor-fullName"
      type="text"
      formControlName="fullName"
      [placeholder]="'iam.supervisors.newSupervisor.fullName.placeholder' | translate"
    />
  </div>

  <div class="field">
    <label for="supervisor-corporateId">
      {{ 'iam.supervisors.newSupervisor.corporateId.label' | translate }}
    </label>
    <input
      id="supervisor-corporateId"
      type="text"
      formControlName="corporateId"
      [placeholder]="'iam.supervisors.newSupervisor.corporateId.placeholder' | translate"
    />
  </div>

  <div class="field">
    <label for="supervisor-email">
      {{ 'iam.supervisors.newSupervisor.email.label' | translate }}
    </label>
    <input
      id="supervisor-email"
      type="email"
      formControlName="email"
      [placeholder]="'iam.supervisors.newSupervisor.email.placeholder' | translate"
    />
  </div>

  <button
    mat-flat-button
    color="primary"
    class="submit-btn"
    type="submit"
    [disabled]="form.invalid"
  >
    <mat-icon>mail</mat-icon>
    <span>{{ 'iam.supervisors.newSupervisor.submit' | translate }}</span>
  </button>

  <p class="form-hint">{{ 'iam.supervisors.newSupervisor.hint' | translate }}</p>
</form>
