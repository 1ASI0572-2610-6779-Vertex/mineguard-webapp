<div class="alerts-page">
  <header class="page-header">
    <div class="page-header-left">
      <div class="page-header-icon">
        <mat-icon>shield</mat-icon>
      </div>
      <div>
        <h1>{{ 'monitoring.alerts.pageTitle' | translate }}</h1>
        <p>{{ 'monitoring.alerts.pageSubtitle' | translate }}</p>
      </div>
    </div>
  </header>

  <div class="page-grid">
    <app-alerts-inbox
      [alerts]="alerts()"
      [selectedAlertId]="selectedAlertId()"
      (alertSelected)="onAlertSelected($event)"
    ></app-alerts-inbox>

    <app-alert-detail
      [alert]="selectedAlert()"
      (classify)="onClassify($event)"
    ></app-alert-detail>
  </div>
</div>
