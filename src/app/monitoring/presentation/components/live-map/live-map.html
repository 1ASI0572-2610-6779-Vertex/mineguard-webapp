<section class="live-map">

  <!-- Top-left telemetry overlay chips -->
  <div class="map-hud-tl">
    <span class="hud-chip hud-chip--dark">
      <span class="hud-dot hud-dot--pulse"></span>
      EN VIVO
    </span>
    <span class="hud-chip hud-chip--dark">
      <span class="hud-dot hud-dot--success"></span>
      {{ operationalCount }} operativos
    </span>
    @if (alertCount > 0) {
      <span class="hud-chip hud-chip--alert">
        <span class="hud-dot hud-dot--danger"></span>
        {{ alertCount }} en alerta
      </span>
    }
  </div>

  <!-- Map container -->
  <div #mapContainer class="map-container"></div>

</section>
